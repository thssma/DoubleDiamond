<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoubleDiamond Field Operations Platform</title>
  <link rel="icon" href="data:,">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">💎</div>
        <div>
          <h2>DoubleDiamond</h2>
          <span>Field Operations Platform</span>
        </div>
      </div>

      <nav class="nav">
        <button class="menu-btn active" onclick="changePage('dashboard', event)">📊 Dashboard</button>
        <button class="menu-btn" onclick="changePage('empresas', event)">🏢 Empresas</button>
        <button class="menu-btn" onclick="changePage('integrationHub', event)">🔌 Integrações</button>
        <button class="menu-btn" onclick="changePage('aiFoundation', event)">🤖 AI Foundation</button>
        <button class="menu-btn" onclick="changePage('executiveDashboard', event)">📈 Executivo</button>
        <button class="menu-btn" onclick="changePage('kpiCenter', event)">🎯 KPIs</button>
        <button class="menu-btn" onclick="changePage('automationCenter', event)">⚙️ Automações</button>
        <button class="menu-btn" onclick="changePage('reportCenter', event)">📑 Relatórios</button>
        <button class="menu-btn" onclick="changePage('mobileReady', event)">📱 Mobile Ready</button>
        <button class="menu-btn" onclick="changePage('fieldDashboard', event)">🌱 Campo</button>
        <button class="menu-btn" onclick="changePage('pwaCenter', event)">📲 PWA</button>
        <button class="menu-btn" onclick="changePage('routePlanning', event)">🗺️ Rotas</button>
        <button class="menu-btn" onclick="changePage('weatherCenter', event)">🌦️ Clima</button>
        <button class="menu-btn" onclick="changePage('mobileWorkforce', event)">👷 Mobile Workforce</button>
        <button class="menu-btn" onclick="changePage('workOrders', event)">🧾 Ordens Serviço</button>
        <button class="menu-btn" onclick="changePage('configuracoes', event)">⚙️ Configurações</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">DoubleDiamond Platform</p>
          <h1 id="pageTitle">Field Operations Platform</h1>
          <p class="subtitle">PWA, campo, rotas, clima, GPS, fotos, assinaturas e ordens de serviço.</p>
        </div>
        <div class="top-actions">
          <span class="badge">V31/V32/V33/V34/V35/V36/V37/V38/V39/V40</span>
          <span class="badge success">Foundation</span>
        </div>
      </header>

      <section id="pageContent"></section>
    </main>
  </div>

  <script src="script.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
</script>
</body>
</html>
