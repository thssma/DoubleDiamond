<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleDiamond</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <div class="logo">
                <div class="logo-icon">💎</div>
                <h2>DoubleDiamond</h2>
            </div>

            <nav>

                <button class="menu-btn active" onclick="changePage('dashboard', event)">
                    📊 Dashboard
                </button>

                <button class="menu-btn" onclick="changePage('clientes', event)">
                    👥 Clientes
                </button>

                <button class="menu-btn" onclick="changePage('orcamentos', event)">
                    📋 Orçamentos
                </button>

                <button class="menu-btn" onclick="changePage('projetos', event)">
                    📁 Projetos
                </button>

                <button class="menu-btn" onclick="changePage('agenda', event)">
                    📅 Agenda
                </button>

                <button class="menu-btn" onclick="changePage('financeiro', event)">
                    💰 Financeiro
                </button>

                <button class="menu-btn" onclick="changePage('configuracoes', event)">
                    ⚙️ Configurações
                </button>

            </nav>

        </aside>

        <main class="content">

            <header class="topbar">
                <div>
                    <h1 id="pageTitle">Dashboard</h1>
                    <p class="subtitle">
                        Property Maintenance Management Platform
                    </p>
                </div>
            </header>

            <section id="pageContent">

                <div class="cards">

                    <div class="card">
                        <h3>Clientes</h3>
                        <p>0</p>
                    </div>

                    <div class="card">
                        <h3>Orçamentos</h3>
                        <p>0</p>
                    </div>

                    <div class="card">
                        <h3>Projetos</h3>
                        <p>0</p>
                    </div>

                    <div class="card">
                        <h3>Receita</h3>
                        <p>R$ 0,00</p>
                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="script.js"></script>

</body>

</html>
