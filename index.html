<!DOCTYPE html>

  <link rel="icon" href="data:," />

        <button class="menu-btn" onclick="changePage('fotos', event)">📸 Fotos Orçamentos</button>

        <button class="menu-btn" onclick="changePage('usuarios', event)">🔐 Usuários</button>
        <button class="menu-btn" onclick="changePage('backup', event)">💾 Backup</button>
        <button class="menu-btn" onclick="changePage('configuracoes', event)">⚙️ Configurações</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">DoubleDiamond Platform</p>
          <h1 id="pageTitle">Dashboard</h1>
          <p class="subtitle">Gestão moderna de manutenção de propriedades.</p>
        </div>

        <div class="top-actions">
          <span class="badge">V7.0 Business Suite</span>
          <span class="badge success">Supabase ON</span>

      <section id="pageContent"></section>
